name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  GODOT_STATUS: "stable"
  PRESET_NAME: "Android"
  APK_NAME: "snake-aether.apk"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Java 17 ---------------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Confirm Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la "$JAVA_HOME/bin/java" "$JAVA_HOME/bin/javac"
          java -version
          javac -version

      # --- Android SDK -----------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest" >/dev/null
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/build-tools" || true
          ls "$ANDROID_HOME/platforms" || true

      # --- Godot 4.3 binary -------------------------------------------------
      - name: Download Godot ${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}
        run: |
          set -e
          mkdir -p "$HOME/godot"
          cd "$HOME/godot"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          echo "Downloading $URL"
          curl -fSL "$URL" -o godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" godot
          chmod +x godot
          echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Confirm Godot
        run: |
          "$HOME/godot/godot" --version

      # --- Godot export templates -------------------------------------------
      - name: Install Godot export templates
        run: |
          set -e
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cd /tmp
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          echo "Downloading $URL"
          curl -fSL "$URL" -o templates.tpz
          unzip -q templates.tpz
          # The archive contains a 'templates' directory
          mv templates "$TPL_DIR"
          echo "=== Installed templates ==="
          ls -la "$TPL_DIR" | head -30

      # --- Debug keystore ---------------------------------------------------
      - name: Generate debug keystore
        run: |
          set -e
          mkdir -p "$HOME/.android"
          KS="$HOME/.android/debug.keystore"
          if [ ! -f "$KS" ]; then
            keytool -keyalg RSA -genkeypair -alias androiddebugkey \
              -keypass android -keystore "$KS" \
              -storepass android -dname "CN=Android Debug,O=Android,C=US" \
              -validity 9999 -deststoretype pkcs12
          fi
          ls -la "$KS"

      # --- Godot editor settings (export paths) -----------------------------
      - name: Write Godot editor settings
        run: |
          set -e
          mkdir -p "$HOME/.config/godot"
          SETTINGS="$HOME/.config/godot/editor_settings-4.tres"
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
            echo "export/android/java_sdk_path = \"$JAVA_HOME\""
            echo "export/android/debug_keystore = \"$HOME/.android/debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
            echo 'export/android/force_system_user = false'
            echo 'export/android/shutdown_adb_on_exit = true'
            echo 'export/android/one_click_deploy_clear_previous_install = false'
            echo 'export/android/use_wifi_for_remote_debug = false'
          } > "$SETTINGS"
          echo "=== Editor settings ==="
          cat "$SETTINGS"

      # --- Project import ---------------------------------------------------
      - name: Import project (warm caches)
        run: |
          set +e
          "$HOME/godot/godot" --headless --import 2>&1 | tee /tmp/import.log | tail -120
          echo "godot exit=$?"
          true

      - name: Fail if script errors detected during import
        run: |
          set -e
          if grep -E "(SCRIPT ERROR|Parse Error|Failed to load script|Cannot infer|No constructor|not found in base)" /tmp/import.log; then
            echo "::error::GDScript parse/runtime errors above — aborting before export"
            echo "=== Full import log tail ==="
            tail -200 /tmp/import.log
            exit 1
          fi
          echo "No GDScript errors detected in import log."

      - name: Re-write editor settings (Godot may have overwritten)
        run: |
          set -e
          SETTINGS="$HOME/.config/godot/editor_settings-4.tres"
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
            echo "export/android/java_sdk_path = \"$JAVA_HOME\""
            echo "export/android/debug_keystore = \"$HOME/.android/debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
            echo 'export/android/force_system_user = false'
            echo 'export/android/shutdown_adb_on_exit = true'
          } > "$SETTINGS"
          echo "=== Editor settings (refreshed) ==="
          cat "$SETTINGS"

      # --- Sanity check -----------------------------------------------------
      - name: Show export_presets.cfg
        run: |
          if [ -f export_presets.cfg ]; then
            echo "=== export_presets.cfg ==="
            cat export_presets.cfg
          else
            echo "::error::export_presets.cfg missing!"
            exit 1
          fi

      # --- Export the APK ---------------------------------------------------
      - name: Export Android APK
        run: |
          set -e
          mkdir -p build
          "$HOME/godot/godot" --headless --verbose \
            --export-debug "${PRESET_NAME}" "$PWD/build/${APK_NAME}" 2>&1 | tee /tmp/export.log
          GODOT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== Export log tail ==="
          tail -120 /tmp/export.log
          echo ""
          echo "=== Build directory ==="
          ls -lah build/ || true
          echo "Godot exit: $GODOT_EXIT"
          if [ -f "build/${APK_NAME}" ] && [ $GODOT_EXIT -eq 0 ]; then
            echo "APK built successfully."
          else
            echo "::error::APK build failed (godot exit=$GODOT_EXIT)"
            exit ${GODOT_EXIT:-1}
          fi

      # --- Upload artifacts -------------------------------------------------
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snake-aether-apk
          path: build/*.apk
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/import.log
            /tmp/export.log
          if-no-files-found: ignore
